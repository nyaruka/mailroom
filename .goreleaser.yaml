version: 2
builds:
  - id: mailroom
    main: ./cmd/mailroom/main.go
    binary: mailroom
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: mrindex
    main: ./cmd/mrindex/main.go
    binary: mrindex
    goos:
      - linux
    goarch:
      - amd64
      - arm64

changelog:
  filters:
    exclude:
      - "^Update CHANGELOG.md"

archives:
  - files:
      - LICENSE
      - README.md
      - docs/*
      - docs/**/*
